<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ombu WebGIS Starter — Demo Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --ink: #4b2e2e;
      --muted: #817877;
      --paper: #fffaf5;
      --line: #ddd7c4;
      --accent: #c06158;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #fffdf9 0%, #f8efe5 100%);
    }
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
    }
    .topbar h1 {
      margin: 0 0 4px;
      font-size: 1.15rem;
      font-weight: 600;
    }
    .topbar p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      min-height: 0;
    }
    #map {
      min-height: 70vh;
      background: #f2f2f2;
    }
    .sidebar {
      border-left: 1px solid var(--line);
      background: var(--paper);
      padding: 14px 16px;
      overflow: auto;
    }
    .sidebar h2 {
      margin: 0 0 8px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .status {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .layer-list label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-size: 0.85rem;
    }
    .swatch {
      width: 18px;
      height: 12px;
      border-radius: 2px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      flex-shrink: 0;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-left: none; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <h1 id="map-title">WebGIS starter demo</h1>
      <p id="map-subtitle">Placeholder layers — copy this pack into a new repo and replace data under <code>data/map_geojson/</code>.</p>
    </header>
    <div class="layout">
      <div id="map" role="application" aria-label="Map"></div>
      <aside class="sidebar">
        <p class="status" id="map-status">Loading…</p>
        <section>
          <h2>Layers</h2>
          <div class="layer-list" id="layer-list"></div>
        </section>
        <section style="margin-top: 16px;">
          <h2>Legend</h2>
          <div id="legend-list"></div>
        </section>
      </aside>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./js/ombu_palette_tokens.js"></script>
  <script src="./js/viewer_base_layers.js"></script>
  <script src="./js/starter_viewer.js"></script>
</body>
</html>
